name: Push esp-mochi-node to IDF Component Registry

on:
  push:
    branches:
      - main

jobs:
  upload_components:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: "recursive"

      - name: Upload esp-mochi-node to IDF Component Registry
        uses: espressif/upload-components-ci-action@v2
        with:
          components: "esp-mochi-node:components/esp-mochi-node"
          namespace: "espressif"
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
